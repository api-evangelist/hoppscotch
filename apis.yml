    name: Hoppscotch
    description: >-
      Hoppscotch is a lightweight open-source browser-based API client supporting
      REST, GraphQL, WebSockets, SSE, and MQTT. It provides a minimalist,
      web-based API development suite with real-time collaboration, environment
      variables, collections, and test scripting across web, desktop, and CLI
      clients.
