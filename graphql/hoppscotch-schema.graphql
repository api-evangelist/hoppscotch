  """Name of the mock server"""
  name: String!

  """Subdomain for the mock server"""
  subdomain: String!

  """Server URL using subdomain pattern"""
  serverUrlDomainBased: String

  """Server URL using path pattern"""
  serverUrlPathBased: String!

  """Type of workspace: USER or TEAM"""
  workspaceType: WorkspaceType!

  """ID of the workspace (user or team)"""
  workspaceID: String

  """Delay in milliseconds before responding"""
  delayInMs: Int!

  """Whether the mock server is active"""
  isActive: Boolean!

  """Whether the mock server is publicly accessible"""
  isPublic: Boolean!

  """Date and time when the mock server was created"""
  createdOn: DateTime!

  """Date and time when the mock server was last updated"""
  updatedOn: DateTime!
}

"""
A mock server log entry recording an HTTP request and response.
"""
type MockServerLog {
  """ID of the log entry"""
  id: ID!

  """ID of the mock server"""
  mockServerID: ID!

  """HTTP method of the request"""
  requestMethod: String!

  """Path of the request"""
  requestPath: String!

  """Request headers as JSON string"""
  requestHeaders: String!

  """Request body as JSON string"""
  requestBody: String

  """Request query parameters as JSON string"""
  requestQuery: String

  """HTTP status code of the response"""
  responseStatus: Int!

  """Response headers as JSON string"""
  responseHeaders: String!

  """Response body as JSON string"""
  responseBody: String

  """Response time in milliseconds"""
  responseTime: Int!

  """IP address of the requester"""
  ipAddress: String

  """User agent of the requester"""
  userAgent: String

  """Date and time when the request was executed"""
  executedAt: DateTime!
}

