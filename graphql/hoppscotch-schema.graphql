# ─── Query ────────────────────────────────────────────────────────────────────

type Query {
  # User
  """Gives details of the user executing this query (requires Bearer auth)"""
  me: User!

  # Teams
  """List of teams that the executing user belongs to"""
  myTeams(cursor: ID): [Team!]!

  """Returns the detail of the team with the given ID"""
  team(teamID: ID!): Team

  """Returns the list of teams a user is a member of (admin-only)"""
  teamsByUser(userUid: ID!, cursor: ID, take: Int): [Team!]!

  # Team Collections
  """Returns the collections of a team"""
  rootCollectionsOfTeam(teamID: ID!, cursor: ID): [TeamCollection!]!

  """Export a team's collections as JSON"""
  exportCollectionsToJSON(teamID: ID!): String!

  """Export a single team collection as JSON"""
  exportCollectionToJSON(collectionID: ID!): String!

  """Get a Team Collection by ID"""
  collection(collectionID: ID!): TeamCollection

  # Team Requests
  """Search the team for a specific request with title"""
  searchForRequest(teamID: ID!, searchTerm: String!, cursor: ID, take: Int): [TeamRequest!]!

  """Get a request with the given ID"""
  request(requestID: ID!): TeamRequest

  """Get a paginated list of requests in a team collection"""
  requestsInCollection(collectionID: ID!, cursor: ID, take: Int): [TeamRequest!]!

  # Team Invitations
  """Get a team invitation by ID"""
  teamInvitation(inviteID: ID!): TeamInvitation!

  # Shortcodes
  """Resolve and return a shortcode"""
  shortcode(code: ID!): Shortcode

  """List all shortcodes the current user has generated"""
  myShortcodes(cursor: ID, take: Int): [Shortcode!]!

  # User Collections (personal)
  """Get root user collections of a given type"""
  rootGQLUserCollections(cursor: ID): [UserCollection!]!

  """Get root REST user collections"""
  rootRESTUserCollections(cursor: ID): [UserCollection!]!

  """Export user collections to JSON"""
  exportUserCollectionsToJSON(collectionID: ID, collectionType: ReqType!): UserCollectionExportJSONData!

  """Get a single user collection"""
  userCollection(collectionID: ID!): UserCollection

  """Get a single user request"""
  userRequest(id: ID!): UserRequest

  # User History
  """Get REST request history for the current user"""
  myRESTHistory(cursor: ID, take: Int): [UserHistory!]!

  # User Settings
  """Get settings for the current user"""
  userSettings: UserSettings

  # User Environments
  """Get all user environments"""
  userEnvironments: [UserEnvironment!]!

  """Get global user environment"""
  globalUserEnvironment: UserEnvironment

  # Admin / Infra
  """Gives details of the admin executing this query"""
  admin: Admin!

  """List all users in the infrastructure"""
  allUsers(cursor: ID, take: Int): [User!]!

  """List all users V2 with search"""
  allUsersV2(searchString: String, take: Int, skip: Int): [User!]!

  """List all teams"""
  allTeams(cursor: ID, take: Int): [Team!]!

  """List all teams V2"""
  allTeamsV2(searchString: String, take: Int, skip: Int): [Team!]!

  """Get team info by ID (admin)"""
  teamInfo(teamUid: ID!): Team!

  """Get infra metrics"""
  infra: Infra!

  """Get infra configs"""
  infraConfigs(configNames: [InfraConfigEnum!]!): [InfraConfig!]!

  """Get allowed auth providers"""
  allowedAuthProviders: [String!]!

  """Get all infra tokens"""
  infraTokens(take: Int, skip: Int): [InfraToken!]!

  """Get invited users"""
  invitedUsers: [InvitedUser!]!

  """Get pending invites for a team"""
  pendingInvitesByAdmin(teamID: ID!): [TeamInvitation!]!

  """Get all shortcodes (admin)"""
  allShortcodes(cursor: ID, take: Int): [ShortcodeWithUserEmail!]!

  """Check if SMTP is enabled"""
  isSMTPEnabled: Boolean!

  """Check if user history is enabled"""
  isUserHistoryEnabled: Boolean!

  """Get proxy app URL"""
  getProxyAppUrl: String

  """Get teams of a user (admin)"""
  teamsOfUserByAdmin(userUid: ID!): [Team!]!

  # Mock Servers
  """Get a mock server by ID"""
  mockServer(id: ID!): MockServer

  """Get all mock servers for the current user"""
  myMockServers: [MockServer!]!

  """Get all mock servers for a team"""
  teamMockServers(teamID: ID!, take: Int, skip: Int): [MockServer!]!

  """Get mock server logs"""
  mockServerLogs(mockServerID: ID!, take: Int, skip: Int): [MockServerLog!]!

  # Published Docs
  """Get a published doc by slug"""
  publishedDoc(slug: String!, version: String): PublishedDocs

  """List published docs for a team"""
  teamPublishedDocsList(teamID: ID!): [PublishedDocs!]!

  """List published docs for a user"""
  userPublishedDocsList: [PublishedDocs!]!
}

# ─── Mutation ─────────────────────────────────────────────────────────────────

type Mutation {
  # User
  """Update user sessions"""
  updateUserSessions(currentSession: String!, sessionType: SessionType!): User!

  """Update a user's display name"""
  updateDisplayName(updatedDisplayName: String!): User!

  """Delete the executing user's account"""
  deleteUser: Boolean!

  # Teams
  """Creates a team owned by the executing user"""
  createTeam(name: String!): Team!

  """Leaves a team the executing user is a part of"""
  leaveTeam(teamID: ID!): Boolean!

  """Removes a team member from the team"""
  removeTeamMember(teamID: ID!, userUid: ID!): Boolean!

  """Renames a team"""
  renameTeam(teamID: ID!, newName: String!): Team!

  """Deletes a team"""
  deleteTeam(teamID: ID!): Boolean!

  """Updates a team member's role"""
  updateTeamMemberRole(teamID: ID!, userUid: ID!, newRole: TeamAccessRole!): TeamMember!

  # Team Collections
  """Create a root team collection"""
  createRootCollection(teamID: ID!, title: String!): TeamCollection!

  """Create a child team collection"""
  createChildCollection(collectionID: ID!, childTitle: String!): TeamCollection!

  """Rename a team collection"""
  renameCollection(collectionID: ID!, newTitle: String!): TeamCollection!

  """Delete a team collection"""
  deleteCollection(collectionID: ID!): Boolean!

  """Import collections from JSON into a team"""
  importCollectionsFromJSON(teamID: ID!, jsonString: String!, parentCollectionID: ID): Boolean!

  """Move a team collection"""
  moveRESTTeamCollection(collectionID: ID!, parentCollectionID: ID): TeamCollection!

  """Update the order of team collections"""
  updateCollectionOrder(collectionID: ID!, nextCollectionID: ID): Boolean!

  """Duplicate a team collection"""
  duplicateTeamCollection(collectionID: ID!): Boolean!

  """Update a team collection"""
  updateTeamCollection(collectionID: ID!, newTitle: String, data: String): TeamCollection!

  """Sort team collections"""
  sortTeamCollections(collectionID: ID, sortOption: SortOptions!): Boolean!

  # Team Requests
  """Create a team request in the given collection"""
  createRequestInCollection(collectionID: ID!, data: String!): TeamRequest!

  """Update a request with the given ID"""
  updateRequest(requestID: ID!, data: String!): TeamRequest!

  """Delete a request with the given ID"""
  deleteRequest(requestID: ID!): Boolean!

  """Move a request to the given collection"""
  moveRequest(requestID: ID!, nextRequestID: ID, destinationCollectionID: ID!): TeamRequest!

