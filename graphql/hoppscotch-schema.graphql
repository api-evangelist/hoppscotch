# Hoppscotch Backend GraphQL Schema
# Reconstructed from source resolvers and models at:
# https://github.com/hoppscotch/hoppscotch/tree/main/packages/hoppscotch-backend
# Endpoint: https://{your-hoppscotch-backend}/graphql

# ─── Scalars ──────────────────────────────────────────────────────────────────

scalar DateTime

# ─── Enums ────────────────────────────────────────────────────────────────────

enum SessionType {
  REST
  GQL
}

enum TeamAccessRole {
  OWNER
  EDITOR
  VIEWER
}

enum ReqType {
  REST
  GQL
}

enum WorkspaceType {
  USER
  TEAM
}

enum SortOptions {
  TITLE_ASC
  TITLE_DESC
}

enum AuthProvider {
  GOOGLE
  GITHUB
  MICROSOFT
  EMAIL
}

enum ServiceStatus {
  ENABLE
  DISABLE
}

enum InfraConfigEnum {
  ONBOARDING_COMPLETED
  ONBOARDING_RECOVERY_TOKEN
  JWT_SECRET
  SESSION_SECRET
  SESSION_COOKIE_NAME
  TOKEN_SALT_COMPLEXITY
  MAGIC_LINK_TOKEN_VALIDITY
  REFRESH_TOKEN_VALIDITY
  ACCESS_TOKEN_VALIDITY
  ALLOW_SECURE_COOKIES
  RATE_LIMIT_TTL
  RATE_LIMIT_MAX
  MAILER_SMTP_ENABLE
  MAILER_USE_CUSTOM_CONFIGS
  MAILER_SMTP_URL
  MAILER_ADDRESS_FROM
  MAILER_SMTP_HOST
  MAILER_SMTP_PORT
  MAILER_SMTP_SECURE
  MAILER_SMTP_USER
  MAILER_SMTP_PASSWORD
  MAILER_TLS_REJECT_UNAUTHORIZED
  MAILER_SMTP_IGNORE_TLS
  MAILER_SMTP_AUTH_TYPE
  MAILER_SMTP_OAUTH2_USER
  MAILER_SMTP_OAUTH2_CLIENT_ID
  MAILER_SMTP_OAUTH2_CLIENT_SECRET
  MAILER_SMTP_OAUTH2_REFRESH_TOKEN
  MAILER_SMTP_OAUTH2_ACCESS_URL
  GOOGLE_CLIENT_ID
  GOOGLE_CLIENT_SECRET
  GOOGLE_CALLBACK_URL
  GOOGLE_SCOPE
  GITHUB_CLIENT_ID
  GITHUB_CLIENT_SECRET
  GITHUB_CALLBACK_URL
  GITHUB_SCOPE
  MICROSOFT_CLIENT_ID
  MICROSOFT_CLIENT_SECRET
  MICROSOFT_CALLBACK_URL
  MICROSOFT_SCOPE
  MICROSOFT_TENANT
}

# ─── Core Types ───────────────────────────────────────────────────────────────

"""
A registered user account.
"""
type User {
  """UID of the user"""
  uid: ID!

  """Name of the user (if fetched)"""
  displayName: String

  """Email of the user"""
  email: String

  """URL to the profile photo of the user (if fetched)"""
  photoURL: String

  """Flag to determine if user is an Admin or not"""
  isAdmin: Boolean!

  """Date when the user last logged in"""
  lastLoggedOn: DateTime

  """Date when the user last interacted with the app"""
  lastActiveOn: DateTime

  """Date when the user account was created"""
  createdOn: DateTime!

  """Stringified current REST session for logged-in User"""
  currentRESTSession: String

  """Stringified current GraphQL session for logged-in User"""
  currentGQLSession: String
}

"""
Result of a bulk user deletion operation.
"""
type UserDeletionResult {
  """UID of the user"""
  userUID: ID!

  """Flag to determine if user deletion was successful or not"""
  isDeleted: Boolean!

  """Error message if user deletion was not successful"""
  errorMessage: String
}

"""
Admin view of a user (without session and isAdmin fields).
"""
type Admin {
  uid: ID!
  displayName: String
  email: String
  photoURL: String
  lastLoggedOn: DateTime
  lastActiveOn: DateTime
  createdOn: DateTime!
}

"""
Infrastructure context for admin operations.
"""
type Infra {
  """Admin who executed the action"""
  executedBy: Admin!
}

"""
A user invited to join the infrastructure.
"""
type InvitedUser {
  """Admin UID"""
  adminUid: ID!

  """Admin email"""
  adminEmail: String!

  """Invitee email"""
  inviteeEmail: String!

  """Date when the user invitation was sent"""
  invitedOn: DateTime!
}

# ─── Team Types ───────────────────────────────────────────────────────────────

"""
A collaborative team workspace.
"""
type Team {
  """ID of the team"""
  id: ID!

  """Displayed name of the team"""
  name: String!

  """List of members in this team"""
  members(cursor: ID): [TeamMember!]!

  """The role of the current user in the team"""
  myRole: TeamAccessRole

  """The number of users with the OWNER role in the team"""
  ownersCount: Int!

  """The number of users with the EDITOR role in the team"""
  editorsCount: Int!

  """The number of users with the VIEWER role in the team"""
  viewersCount: Int!

  """Team environments"""
  teamEnvironments: [TeamEnvironment!]!

  """Team invitations"""
  teamInvitations: [TeamInvitation!]!
}

"""
A member of a team.
"""
type TeamMember {
  """Membership ID of the Team Member"""
  membershipID: ID!

  """Role of the given team member in the given team"""
  role: TeamAccessRole!
}

# ─── Team Collection Types ────────────────────────────────────────────────────

"""
A collection of requests belonging to a team.
"""
type TeamCollection {
  """ID of the collection"""
  id: ID!

  """Displayed title of the collection"""
  title: String!

  """JSON string representing the collection data"""
  data: String

  """ID of the parent collection (null if root)"""
  parentID: ID

  """The team this collection belongs to"""
  team: Team!

  """Parent team collection (null if root)"""
  parent: TeamCollection

  """Child collections"""
  children(cursor: ID, take: Int): [TeamCollection!]!
}

"""
Data for a reorder operation on team collections.
"""
type CollectionReorderData {
  """Team Collection being moved"""
  collection: TeamCollection!

  """Team Collection succeeding the moved collection in its new position"""
  nextCollection: TeamCollection
}

# ─── Team Request Types ───────────────────────────────────────────────────────

"""
A saved API request belonging to a team collection.
"""
type TeamRequest {
  """ID of the request"""
  id: ID!

  """ID of the collection the request belongs to"""
  collectionID: ID!

  """ID of the team the request belongs to"""
  teamID: ID!

  """JSON string representing the request data"""
  request: String!

  """Displayed title of the request"""
  title: String!

  """The team this request belongs to"""
  team: Team!

  """The collection this request belongs to"""
  collection: TeamCollection!
}

"""
Data for a reorder operation on team requests.
"""
type RequestReorderData {
  """Team Request being moved"""
  request: TeamRequest!

  """Team Request succeeding the moved request in its new position"""
  nextRequest: TeamRequest
}

# ─── Team Environment Types ───────────────────────────────────────────────────

"""
A set of environment variables for a team.
"""
type TeamEnvironment {
  """ID of the Team Environment"""
  id: ID!

  """ID of the team this environment belongs to"""
  teamID: ID!

  """Name of the environment"""
  name: String!

  """All variables present in the environment (JSON string)"""
  variables: String!
}

# ─── Team Invitation Types ────────────────────────────────────────────────────

"""
An invitation to join a team.
"""
type TeamInvitation {
  """ID of the invite"""
  id: ID!

  """ID of the team the invite is for"""
  teamID: ID!

  """UID of the creator of the invite"""
  creatorUid: ID!

  """Email of the invitee"""
  inviteeEmail: String!

  """The role that will be given to the invitee"""
  inviteeRole: TeamAccessRole!

  """The team associated with the invite"""
  team: Team!

  """The creator of the invite"""
  creator: User!
}

# ─── Shortcode Types ──────────────────────────────────────────────────────────

"""
A short URL/code for sharing a saved API request.
"""
type Shortcode {
  """The 12-digit alphanumeric code"""
  id: ID!

  """JSON string representing the request data"""
  request: String!

  """JSON string representing the embed properties"""
  properties: String

  """Timestamp of when the Shortcode was created"""
  createdOn: DateTime!
}

"""
Creator info for a shortcode (admin view).
"""
type ShortcodeCreator {
  """UID of user who created the shortcode"""
  uid: String!

  """Email of user who created the shortcode"""
  email: String!
}

"""
A shortcode with its creator's email (admin view).
"""
type ShortcodeWithUserEmail {
  """The 12-digit alphanumeric code"""
  id: ID!

  """JSON string representing the request data"""
  request: String!

  """JSON string representing the embed properties"""
  properties: String

  """Timestamp of when the Shortcode was created"""
  createdOn: DateTime!

  """Details of user who created the shortcode"""
  creator: ShortcodeCreator
}

# ─── User Collection Types ────────────────────────────────────────────────────

